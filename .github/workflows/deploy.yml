name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: cd /var/www/reps && bash deploy/deploy.sh

      - name: Health check
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          sleep 5
          curl -sf "$APP_URL/health" || exit 1

      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$NOTIFY_EMAIL" ]; then
            echo "Resend not configured — skipping failure notification"
            exit 0
          fi
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"reps <noreply@reps.sh>\",
              \"to\": \"$NOTIFY_EMAIL\",
              \"subject\": \"reps deploy failed\",
              \"html\": \"<p>Deploy failed for commit <code>${COMMIT_SHA:0:7}</code>.</p><p><a href='$RUN_URL'>View logs</a></p>\"
            }"
